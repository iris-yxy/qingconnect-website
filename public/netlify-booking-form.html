<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netlify Booking Form</title>
  </head>
  <body>
    <form
      name="booking-enquiry"
      method="POST"
      action="/netlify-booking-form.html"
      data-netlify="true"
    >
      <input type="hidden" name="form-name" value="booking-enquiry" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="requestedTime" />
      <input type="text" name="deliveryMode" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
